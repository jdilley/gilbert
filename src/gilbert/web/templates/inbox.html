{% extends "base.html" %}
{% block title %}Gilbert — Inbox{% endblock %}
{% block content %}
<div class="inbox-header">
    <div>
        <h1>Inbox</h1>
        <p class="subtitle">
            <span id="stats"></span>
        </p>
    </div>
    <span class="inbox-updated muted" id="updated"></span>
</div>

<div class="inbox-toolbar">
    <input type="text" id="filter-sender" class="inbox-filter" placeholder="Filter by sender...">
    <input type="text" id="filter-subject" class="inbox-filter" placeholder="Filter by subject...">
    <button type="button" class="btn-sm" id="filter-btn">Search</button>
</div>

<table class="config-table inbox-table">
    <thead>
        <tr>
            <th style="width:30px"></th>
            <th>Date</th>
            <th>From</th>
            <th>Subject</th>
            <th>Snippet</th>
        </tr>
    </thead>
    <tbody id="inbox-body">
        <tr><td colspan="5" class="muted" style="text-align:center;padding:2rem">Loading...</td></tr>
    </tbody>
</table>

<!-- Message detail modal -->
<div class="inbox-modal-overlay hidden" id="modal-overlay">
    <div class="inbox-modal">
        <div class="inbox-modal-header">
            <span class="inbox-modal-title" id="modal-title">Message</span>
            <button class="inbox-modal-close" id="modal-close">&times;</button>
        </div>
        <div class="inbox-modal-body" id="modal-body"></div>
    </div>
</div>

<style>
.inbox-header { display: flex; justify-content: space-between; align-items: flex-start; }
.inbox-updated { font-size: 0.8rem; }
.inbox-toolbar {
    display: flex; gap: 0.5rem; align-items: center;
    margin-bottom: 1rem; flex-wrap: wrap;
}
.inbox-filter {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 4px 10px; border-radius: 6px; font-size: 0.85rem; font-family: var(--font);
    width: 200px;
}
.inbox-filter:focus { outline: none; border-color: var(--accent); }
.inbox-table { font-size: 0.85rem; }
.inbox-table tbody tr { cursor: pointer; transition: background 0.1s; }
.inbox-table tbody tr:hover { background: var(--surface-hover); }
.inbox-table td { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 250px; }
.inbox-table td.col-snippet { max-width: 300px; color: var(--text-muted); }
.msg-dir { font-size: 0.9rem; text-align: center; }
.msg-sender-name { display: block; }
.msg-sender-email { display: block; font-size: 0.75rem; color: var(--text-muted); }

/* Modal */
.inbox-modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.6);
    display: flex; align-items: center; justify-content: center; z-index: 1000;
}
.inbox-modal-overlay.hidden { display: none; }
.inbox-modal {
    background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
    width: 90%; max-width: 700px; max-height: 85vh; display: flex; flex-direction: column;
}
.inbox-modal-header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 1rem 1.25rem; border-bottom: 1px solid var(--border);
}
.inbox-modal-title { font-weight: 600; font-size: 1rem; }
.inbox-modal-close {
    background: none; border: none; color: var(--text-muted); font-size: 1.5rem;
    cursor: pointer; line-height: 1;
}
.inbox-modal-close:hover { color: var(--text); }
.inbox-modal-body { padding: 1.25rem; overflow-y: auto; }

/* Detail inside modal */
.msg-headers { margin-bottom: 1rem; }
.msg-header-row { display: flex; gap: 0.5rem; font-size: 0.85rem; margin-bottom: 0.2rem; }
.msg-label { color: var(--text-muted); min-width: 60px; flex-shrink: 0; }
.msg-body-text {
    white-space: pre-wrap; word-break: break-word; font-size: 0.85rem;
    background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
    padding: 1rem; max-height: 400px; overflow-y: auto; line-height: 1.5;
}
.msg-thread { margin-top: 1rem; border-top: 1px solid var(--border); padding-top: 1rem; }
.msg-thread-title { font-size: 0.8rem; color: var(--text-muted); margin-bottom: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em; }
.msg-thread-item {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    padding: 0.75rem; margin-bottom: 0.5rem; font-size: 0.85rem;
}
.msg-thread-item.outbound { border-left: 3px solid var(--accent); }
.msg-thread-meta { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.3rem; }
.msg-thread-body { white-space: pre-wrap; word-break: break-word; line-height: 1.4; }
.msg-actions { margin-top: 1rem; display: flex; gap: 0.5rem; }
</style>

<script>
let allMessages = [];

async function loadInbox() {
    const sender = document.getElementById('filter-sender').value.trim();
    const subject = document.getElementById('filter-subject').value.trim();

    const params = new URLSearchParams();
    if (sender) params.set('sender', sender);
    if (subject) params.set('subject', subject);
    params.set('limit', '50');

    try {
        const resp = await fetch('/inbox/api/messages?' + params);
        const data = await resp.json();
        allMessages = data.messages || [];
        renderMessages(allMessages);
        document.getElementById('updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    } catch (e) {
        console.error('Failed to load inbox:', e);
    }
}

function renderMessages(messages) {
    const tbody = document.getElementById('inbox-body');
    if (!messages.length) {
        tbody.innerHTML = '<tr><td colspan="5" class="muted" style="text-align:center;padding:2rem">No messages found</td></tr>';
        return;
    }

    tbody.innerHTML = messages.map((msg, idx) => {
        const date = formatDate(msg.date);
        const from = msg.sender_name || msg.sender_email || '(unknown)';
        const dir = msg.is_inbound ? '\u2192' : '\u2190';
        return `
            <tr class="msg-row" data-idx="${idx}">
                <td class="msg-dir">${dir}</td>
                <td>${esc(date)}</td>
                <td>
                    <span class="msg-sender-name">${esc(from)}</span>
                    <span class="msg-sender-email">${esc(msg.sender_email)}</span>
                </td>
                <td>${esc(msg.subject)}</td>
                <td class="col-snippet">${esc(msg.snippet)}</td>
            </tr>
        `;
    }).join('');

    tbody.onclick = function(e) {
        const row = e.target.closest('tr[data-idx]');
        if (row) showDetail(allMessages[parseInt(row.dataset.idx)].message_id);
    };
}

async function showDetail(messageId) {
    const overlay = document.getElementById('modal-overlay');
    const title = document.getElementById('modal-title');
    const body = document.getElementById('modal-body');

    const msg = allMessages.find(m => m.message_id === messageId);
    title.textContent = msg ? msg.subject : 'Message';
    body.innerHTML = '<p class="muted">Loading...</p>';
    overlay.classList.remove('hidden');

    try {
        const resp = await fetch('/inbox/api/messages/' + messageId);
        const detail = await resp.json();

        let html = '<div class="msg-headers">';
        html += `<div class="msg-header-row"><span class="msg-label">From</span><span>${esc(detail.sender_name)} &lt;${esc(detail.sender_email)}&gt;</span></div>`;
        if (detail.to && detail.to.length) {
            const toStr = detail.to.map(a => a.name ? `${a.name} <${a.email}>` : a.email).join(', ');
            html += `<div class="msg-header-row"><span class="msg-label">To</span><span>${esc(toStr)}</span></div>`;
        }
        if (detail.cc && detail.cc.length) {
            const ccStr = detail.cc.map(a => a.name ? `${a.name} <${a.email}>` : a.email).join(', ');
            html += `<div class="msg-header-row"><span class="msg-label">CC</span><span>${esc(ccStr)}</span></div>`;
        }
        html += `<div class="msg-header-row"><span class="msg-label">Date</span><span>${esc(formatDateFull(detail.date))}</span></div>`;
        html += '</div>';

        html += `<div class="msg-body-text">${esc(detail.body_text || '(empty)')}</div>`;

        // Thread view button — only show if thread_id differs from message_id
        if (detail.thread_id && detail.thread_id !== detail.message_id) {
            html += `<div class="msg-actions">`;
            html += `<button type="button" class="btn-sm btn-muted" onclick="showThread('${esc(detail.thread_id)}')">View Thread</button>`;
            html += '</div>';
        }

        body.innerHTML = html;
    } catch (e) {
        body.innerHTML = '<p class="muted">Failed to load message</p>';
    }
}

async function showThread(threadId) {
    const body = document.getElementById('modal-body');
    const existing = body.querySelector('.msg-thread');
    if (existing) { existing.remove(); return; }

    try {
        const resp = await fetch('/inbox/api/threads/' + threadId);
        const data = await resp.json();

        if (!data.messages || data.messages.length <= 1) return;

        let html = '<div class="msg-thread">';
        html += `<div class="msg-thread-title">Thread (${data.messages.length} messages)</div>`;
        for (const m of data.messages) {
            const cls = m.is_inbound ? '' : ' outbound';
            const dir = m.is_inbound ? '\u2192 from' : '\u2190 to';
            const who = m.is_inbound ? (m.sender_name || m.sender_email) : (m.to?.[0]?.email || '');
            const preview = (m.body_text || '').substring(0, 200);
            html += `<div class="msg-thread-item${cls}">`;
            html += `<div class="msg-thread-meta">${esc(dir)} ${esc(who)} &middot; ${esc(formatDateFull(m.date))}</div>`;
            html += `<div class="msg-thread-body">${esc(preview)}${preview.length >= 200 ? '...' : ''}</div>`;
            html += '</div>';
        }
        html += '</div>';
        body.insertAdjacentHTML('beforeend', html);
    } catch (e) {
        console.error('Failed to load thread:', e);
    }
}

function formatDate(dateStr) {
    try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        const now = new Date();
        if (d.toDateString() === now.toDateString()) {
            return d.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }
        return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
    } catch { return dateStr; }
}

function formatDateFull(dateStr) {
    try {
        const d = new Date(dateStr);
        if (isNaN(d.getTime())) return dateStr;
        return d.toLocaleString([], { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
    } catch { return dateStr; }
}

function esc(str) {
    if (!str) return '';
    const el = document.createElement('span');
    el.textContent = String(str);
    return el.innerHTML;
}

async function loadStats() {
    try {
        const resp = await fetch('/inbox/api/stats');
        const s = await resp.json();
        document.getElementById('stats').textContent = `${s.total} messages, ${s.inbound} inbound`;
    } catch (e) { /* ignore */ }
}

document.addEventListener('DOMContentLoaded', () => {
    // Event listeners
    document.getElementById('filter-btn').addEventListener('click', loadInbox);
    ['filter-sender', 'filter-subject'].forEach(id => {
        document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') loadInbox(); });
    });
    document.getElementById('modal-close').addEventListener('click', () => {
        document.getElementById('modal-overlay').classList.add('hidden');
    });
    document.getElementById('modal-overlay').addEventListener('click', e => {
        if (e.target === e.currentTarget) e.currentTarget.classList.add('hidden');
    });

    // Live updates via event bus (debounced)
    if (typeof GilbertEvents !== 'undefined') {
        let _refreshTimer = null;
        GilbertEvents.on('inbox.message.received', () => {
            clearTimeout(_refreshTimer);
            _refreshTimer = setTimeout(loadInbox, 1000);
        });
    }

    loadStats();
    loadInbox();
    setInterval(loadInbox, 30000);
});
</script>
{% endblock %}
