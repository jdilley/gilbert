# Gilbert — default configuration
# This file is committed to the repo and contains sensible defaults.
# To override for your installation, create .gilbert/config.yaml
# (that directory is gitignored — your customizations stay local).

storage:
  backend: sqlite
  connection: .gilbert/gilbert.db

logging:
  level: INFO
  file: .gilbert/gilbert.log
  ai_log_file: .gilbert/ai_calls.log
  loggers: {}
    # httpx: WARNING
    # uvicorn.access: WARNING

web:
  host: "0.0.0.0"
  port: 8000

credentials: {}
  # my-openai:
  #   type: api_key
  #   api_key: sk-abc123
  #
  # lutron-controller:
  #   type: username_password
  #   username: admin
  #   password: secret123
  #
  # google-calendar:
  #   type: google_service_account
  #   service_account_file: .gilbert/credentials/calendar-sa.json
  #   scopes:
  #     - https://www.googleapis.com/auth/calendar.readonly
  #
  # spotify:
  #   type: api_key_pair
  #   client_id: your-client-id
  #   client_secret: your-client-secret
  #
  # google-oauth:
  #   type: api_key_pair
  #   client_id: your-google-oauth-client-id.apps.googleusercontent.com
  #   client_secret: your-google-oauth-client-secret

plugins:
  directories:
    - plugins         # default: ./plugins/ directory in project root
  sources: []         # explicit plugin sources (local paths or GitHub URLs)
  cache_dir: .gilbert/plugin-cache  # where GitHub-sourced plugins are cloned
  # directories:
  #   - /path/to/my/plugins
  # sources:
  #   - source: ./plugins/example-plugin
  #     enabled: true
  #   - source: https://github.com/user/gilbert-plugin-sonos
  #     enabled: true

output_ttl_seconds: 3600  # seconds before service-generated files are cleaned up

users:
  sync_ttl_seconds: 3600  # how often to refresh users from external providers (seconds)

auth:
  enabled: false
  providers:
    - type: local
      enabled: true
  default_roles: ["user"]
  session_ttl_seconds: 86400
  root_password: "password"
  # providers:
  #   - type: google
  #     enabled: true
  #     credential: google_admin
  #     domain: example.com
  #     role_mappings:
  #       - group: admins
  #         role: admin

# google:
#   enabled: true
#   oauth_credential: google-oauth  # name of an api_key_pair credential above
#   accounts:
#     directory:
#       credential: google-sa
#       delegated_user: admin@example.com
#       scopes:
#         - https://www.googleapis.com/auth/admin.directory.user.readonly

inbox:
  enabled: false
  backend: gmail
  credential: ""
  email_address: ""
  poll_interval: 60
  max_body_length: 50000

inbox_ai_chat:
  enabled: false
  allowed_emails: []
  allowed_domains: []

knowledge:
  enabled: false
  sync_interval_seconds: 300
  chunk_size: 1000
  chunk_overlap: 200
  max_search_results: 10
  chromadb_path: .gilbert/chromadb
  sources: []
  # sources:
  #   - type: local
  #     name: docs
  #     path: ./documents
  #   - type: gdrive
  #     name: library
  #     account: drive
  #     folder_id: "your-folder-id"

presence:
  enabled: false
  backend: unifi
  poll_interval_seconds: 30
  unifi_network:
    host: ""
    credential: ""
    verify_ssl: false
  unifi_protect:
    host: ""
    credential: ""
    verify_ssl: false
  device_person_map: {}
  zone_aliases: {}
  face_lookback_minutes: 30
  badge_lookback_hours: 24

doorbell:
  enabled: false
  poll_interval_seconds: 5
  doorbell_names: {}
  # doorbell_names:
  #   "G4 Doorbell": "Front Door"
  #   "G4 Doorbell Pro": "Rear Door"

ai:
  enabled: false
  backend: anthropic
  credential: ""
  system_prompt: "You are Gilbert, an AI assistant for home and business automation."
  max_history_messages: 50
  max_tool_rounds: 10
  settings:
    model: claude-sonnet-4-20250514
    max_tokens: 4096
    temperature: 0.7
  # AI context profiles — define tool access for named AI interactions.
  # Profiles are seeded to storage on first run. Manage at runtime via
  # the AI tools (list_ai_profiles, set_ai_profile, assign_ai_profile)
  # or the web UI at /roles/profiles.
  profiles:
    default:
      description: "All tools available — fallback for unassigned calls"
      tool_mode: all
    human_chat:
      description: "Human conversations via web or Slack"
      tool_mode: exclude
      tools: [sales_lead]
    text_only:
      description: "Text generation only, no tool access"
      tool_mode: include
      tools: []
    sales_agent:
      description: "Sales lead qualification pipeline"
      tool_mode: include
      tools: [sales_lead]

speaker:
  enabled: false
  backend: sonos
  # default_announce_volume: 40  # volume for announcements (0-100), unset = current volume
  settings: {}

music:
  enabled: false
  backend: spotify
  credential: ""
  settings: {}
  # credential: spotify  # name of an api_key_pair credential with client_id/client_secret

tts:
  enabled: false
  backend: elevenlabs
  credential: ""
  default_voice: ""
  voices: {}
  settings:
    model_id: eleven_turbo_v2_5
    silence_padding: 3
  # credential: elevenlabs        # name of an api_key credential above
  # default_voice: default        # name of a voice in the voices map below
  # voices:
  #   default:
  #     voice_id: your-voice-id-here
  #   scary:
  #     voice_id: another-voice-id

radio_dj:
  enabled: false
  default_genres:
    - "classic rock"
    - "90s hits"
    - "blues rock"
    - "indie rock"
    - "funk"
    - "80s hits"
  min_switch_interval: 15  # minutes between auto genre switches
  default_volume: 35       # playback volume (0-100)
  speakers: []             # speaker names (empty = all)
  stop_when_empty: true    # stop when nobody is present
  poll_interval: 60        # seconds between presence polls
