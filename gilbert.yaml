# Gilbert — bootstrap configuration
#
# Only settings needed before entity storage is available live here.
# All other configuration is managed at runtime via the web UI at
# /settings and stored in entity storage.
#
# To override these bootstrap values for your installation, create
# .gilbert/config.yaml (gitignored — your customizations stay local).

storage:
  backend: sqlite
  connection: .gilbert/gilbert.db

logging:
  level: INFO
  file: .gilbert/gilbert.log
  ai_log_file: .gilbert/ai_calls.log
  loggers: {}

web:
  host: "0.0.0.0"
  port: 8000

plugins:
  # Directories scanned for plugins at startup. Each subdirectory with
  # a ``plugin.yaml`` is loaded. Paths are relative to the working
  # directory Gilbert is launched from (the repo root by default).
  #
  # The three standard directories have distinct roles:
  #
  # - ``std-plugins``  — the first-party ``briandilley/gilbert-plugins``
  #   repository, cloned into place. Shared, reviewed, version-controlled
  #   upstream.
  # - ``local-plugins`` — plugins you write yourself for this
  #   installation. Gitignored so your work stays local.
  # - ``installed-plugins`` — plugins installed at runtime from
  #   external sources (e.g. fetched from a GitHub URL).
  directories:
    - std-plugins
    - local-plugins
    - installed-plugins
