# Gilbert — default configuration
# This file is committed to the repo and contains sensible defaults.
# To override for your installation, create .gilbert/config.yaml
# (that directory is gitignored — your customizations stay local).

storage:
  backend: sqlite
  connection: .gilbert/gilbert.db

logging:
  level: INFO
  file: .gilbert/gilbert.log
  ai_log_file: .gilbert/ai_calls.log
  loggers: {}
    # httpx: WARNING
    # uvicorn.access: WARNING

web:
  host: "0.0.0.0"
  port: 8765

credentials: {}
  # my-openai:
  #   type: api_key
  #   api_key: sk-abc123
  #
  # lutron-controller:
  #   type: username_password
  #   username: admin
  #   password: secret123
  #
  # google-calendar:
  #   type: google_service_account
  #   service_account_file: .gilbert/credentials/calendar-sa.json
  #   scopes:
  #     - https://www.googleapis.com/auth/calendar.readonly
  #
  # spotify:
  #   type: api_key_pair
  #   client_id: your-client-id
  #   client_secret: your-client-secret
  #
  # google-oauth:
  #   type: api_key_pair
  #   client_id: your-google-oauth-client-id.apps.googleusercontent.com
  #   client_secret: your-google-oauth-client-secret

plugins: []

output_ttl_seconds: 3600  # seconds before service-generated files are cleaned up
  # - source: ./plugins/example-plugin
  #   enabled: true
  # - source: https://github.com/user/gilbert-plugin-sonos
  #   enabled: true

auth:
  enabled: false
  providers:
    - type: local
      enabled: true
  default_roles: ["user"]
  session_ttl_seconds: 86400
  root_password: "password"
  # providers:
  #   - type: google
  #     enabled: true
  #     credential: google_admin
  #     domain: example.com
  #     role_mappings:
  #       - group: admins
  #         role: admin

# google:
#   enabled: true
#   oauth_credential: google-oauth  # name of an api_key_pair credential above
#   accounts:
#     directory:
#       credential: google-sa
#       delegated_user: admin@example.com
#       scopes:
#         - https://www.googleapis.com/auth/admin.directory.user.readonly

ai:
  enabled: false
  backend: anthropic
  credential: ""
  system_prompt: "You are Gilbert, an AI assistant for home and business automation."
  max_history_messages: 50
  max_tool_rounds: 10
  settings:
    model: claude-sonnet-4-20250514
    max_tokens: 4096
    temperature: 0.7

speaker:
  enabled: false
  backend: sonos
  # default_announce_volume: 40  # volume for announcements (0-100), unset = current volume
  settings: {}

music:
  enabled: false
  backend: spotify
  credential: ""
  settings: {}
  # credential: spotify  # name of an api_key_pair credential with client_id/client_secret

tts:
  enabled: false
  backend: elevenlabs
  credential: ""
  default_voice: ""
  voices: {}
  settings:
    model_id: eleven_turbo_v2_5
    silence_padding: 3
  # credential: elevenlabs        # name of an api_key credential above
  # default_voice: default        # name of a voice in the voices map below
  # voices:
  #   default:
  #     voice_id: your-voice-id-here
  #   scary:
  #     voice_id: another-voice-id
